<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MINECRAFT POCKET BUILDER | Mobile Crafting</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', 'Minecraft', monospace;
            background: #1a1f2e;
            color: #fff;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            touch-action: none;
        }

        /* Mobile-optimized UI */
        .stats {
            position: fixed;
            top: 12px;
            left: 12px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            padding: 8px 14px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 14px;
            border-left: 3px solid #ffaa00;
            z-index: 20;
            pointer-events: none;
            font-family: monospace;
            letter-spacing: 0.5px;
        }

        .inventory-container {
            position: fixed;
            bottom: 70px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            z-index: 15;
            pointer-events: none;
        }

        .inventory-bar {
            background: rgba(20, 20, 30, 0.92);
            backdrop-filter: blur(12px);
            border: 2px solid #aa8c54;
            border-radius: 20px;
            padding: 6px 10px;
            display: flex;
            gap: 6px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            pointer-events: auto;
            overflow-x: auto;
            max-width: 95vw;
            scrollbar-width: thin;
        }

        .slot {
            width: 60px;
            height: 60px;
            background: #2d2d2d;
            border: 2px solid #6a5a3a;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.08s linear;
            position: relative;
            background-image: linear-gradient(145deg, #3a3a3a, #202020);
            flex-shrink: 0;
        }

        .slot.selected {
            border: 3px solid #ffaa33;
            box-shadow: 0 0 12px #ffaa44;
            transform: scale(1.02);
            background: #4a4a2a;
        }

        .slot-icon {
            font-size: 28px;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5));
        }

        .slot-count {
            position: absolute;
            bottom: 3px;
            right: 5px;
            font-size: 12px;
            font-weight: bold;
            background: rgba(0,0,0,0.7);
            padding: 2px 5px;
            border-radius: 20px;
            color: #ffff99;
        }

        .block-name {
            font-size: 8px;
            margin-top: 2px;
            text-align: center;
            color: #ddd;
        }

        /* Mobile action buttons */
        .action-buttons {
            position: fixed;
            bottom: 15px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 20;
            pointer-events: none;
        }

        .mine-btn, .craft-panel-toggle {
            pointer-events: auto;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            border: 2px solid #ffaa44;
            border-radius: 60px;
            padding: 10px 24px;
            font-size: 18px;
            font-weight: bold;
            color: #ffdd99;
            font-family: monospace;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 12px black;
            transition: 0.05s linear;
        }

        .mine-btn:active, .craft-panel-toggle:active {
            transform: scale(0.96);
            background: #ffaa3355;
        }

        /* Crafting Modal (mobile friendly) */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .modal.active {
            visibility: visible;
            opacity: 1;
        }

        .crafting-panel-mobile {
            background: #2a2418e6;
            border-radius: 36px;
            padding: 20px;
            width: 85%;
            max-width: 340px;
            border: 3px solid #ffcc66;
            box-shadow: 0 20px 40px black;
            text-align: center;
        }

        .craft-title {
            font-size: 24px;
            font-weight: bold;
            color: #ffcc44;
            margin-bottom: 16px;
            text-shadow: 2px 2px 0 #3a2a1a;
        }

        .recipe-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .recipe {
            background: #1e1b14;
            border-radius: 20px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 14px;
            border: 1px solid #aa8844;
            cursor: pointer;
            transition: 0.05s linear;
        }

        .recipe:active {
            background: #4a3a1e;
            transform: scale(0.98);
        }

        .recipe-icon {
            font-size: 38px;
            min-width: 55px;
        }

        .recipe-info {
            text-align: left;
            flex: 1;
        }

        .recipe-name {
            font-weight: bold;
            font-size: 16px;
        }

        .recipe-cost {
            font-size: 11px;
            color: #aaffaa;
        }

        .close-modal {
            margin-top: 16px;
            background: #5a4a2a;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        .message-area {
            position: fixed;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            background: #000000cc;
            backdrop-filter: blur(12px);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: bold;
            pointer-events: none;
            z-index: 25;
            border: 1px solid #ffaa55;
            color: #ffffbb;
            white-space: nowrap;
            font-family: monospace;
            max-width: 80vw;
            white-space: normal;
            text-align: center;
        }

        .mode-indicator {
            position: fixed;
            top: 12px;
            right: 12px;
            background: #000000aa;
            backdrop-filter: blur(6px);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: bold;
            z-index: 20;
            pointer-events: none;
            font-family: monospace;
            border-right: 2px solid cyan;
        }

        @keyframes pop {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        .floating-number {
            position: absolute;
            pointer-events: none;
            font-weight: bold;
            font-size: 22px;
            color: #ffdd77;
            text-shadow: 1px 1px 0 black;
            animation: pop 0.5s ease-out forwards;
            z-index: 30;
        }

        /* scrollbar hide */
        .inventory-bar::-webkit-scrollbar {
            height: 3px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="stats">
        🧱 <span id="blockCount">0</span> | ⛏️ <span id="minedCount">0</span>
    </div>
    <div class="mode-indicator" id="modeIndicator">
        🏗️ PLACE MODE
    </div>
    
    <div class="inventory-container">
        <div class="inventory-bar" id="inventoryBar"></div>
    </div>
    
    <div class="action-buttons">
        <div class="mine-btn" id="mineModeBtn">
            ⛏️ MINE
        </div>
        <div class="craft-panel-toggle" id="openCraftBtn">
            🔨 CRAFT
        </div>
    </div>
    
    <div class="message-area" id="messageBox">👉 TAP block: PLACE | HOLD MINE button + TAP = MINE 👈</div>
    
    <!-- Crafting Modal -->
    <div id="craftModal" class="modal">
        <div class="crafting-panel-mobile">
            <div class="craft-title">🔨 CRAFTING TABLE</div>
            <div class="recipe-list" id="mobileRecipeList"></div>
            <button class="close-modal" id="closeModalBtn">CLOSE</button>
        </div>
    </div>

    <script>
        (function(){
            // ---------- MINECRAFT POCKET EDITION ----------
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            
            // World config
            const TILE_SIZE = 52;      // slightly larger for mobile tap
            const WORLD_W = 14;
            const WORLD_H = 12;
            
            const BLOCKS = {
                0: { name: 'AIR', color: '#2e3a48', icon: '⬜', solid: false, visible: false, topColor: '#2e3a48', sideColor: '#1e2a38' },
                1: { name: 'GRASS', color: '#5c9c3c', icon: '🌿', solid: true, topColor: '#6aa84f', sideColor: '#5b8c3a' },
                2: { name: 'DIRT', color: '#8b5a2b', icon: '🟫', solid: true, topColor: '#9b6a3b', sideColor: '#7c4a1e' },
                3: { name: 'STONE', color: '#808080', icon: '🪨', solid: true, topColor: '#9a9a9a', sideColor: '#6e6e6e' },
                4: { name: 'COBBLE', color: '#696969', icon: '🧱', solid: true, topColor: '#7c7c7c', sideColor: '#5a5a5a' },
                5: { name: 'WOOD', color: '#bc9a6c', icon: '🪵', solid: true, topColor: '#c2a16e', sideColor: '#a57c52' },
                6: { name: 'DIAMOND', color: '#5ae0e0', icon: '💎', solid: true, topColor: '#6ef0f0', sideColor: '#3ac0c0' },
                7: { name: 'GOLD', color: '#f5cb42', icon: '🪙', solid: true, topColor: '#ffda6a', sideColor: '#e5b83c' }
            };
            
            let world = Array(WORLD_H).fill().map(() => Array(WORLD_W).fill(1));
            let inventory = [];
            let selectedSlot = 0;
            let totalBlocksPlaced = 0;
            let totalBlocksMined = 0;
            let isMineMode = false;   // false = place, true = mine mode (toggle)
            
            // Recipes
            const recipes = [
                { name: '🪨 STONE', resultId: 3, resultIcon: '🪨', cost: [{ id: 4, amount: 2 }], desc: '2 Cobble → Stone' },
                { name: '🧱 COBBLE', resultId: 4, resultIcon: '🧱', cost: [{ id: 1, amount: 3 }], desc: '3 Grass → Cobble' },
                { name: '🪵 WOOD', resultId: 5, resultIcon: '🪵', cost: [{ id: 2, amount: 2 }], desc: '2 Dirt → Wood' },
                { name: '💎 DIAMOND', resultId: 6, resultIcon: '💎', cost: [{ id: 3, amount: 4 }, { id: 5, amount: 2 }], desc: '4 Stone + 2 Wood' },
                { name: '🪙 GOLD', resultId: 7, resultIcon: '🪙', cost: [{ id: 3, amount: 3 }, { id: 4, amount: 2 }], desc: '3 Stone + 2 Cobble' }
            ];
            
            // Helper functions
            function addToInventory(blockId, amount = 1) {
                for(let i = 0; i < inventory.length; i++) {
                    if(inventory[i].id === blockId) {
                        inventory[i].count += amount;
                        updateInventoryUI();
                        return true;
                    }
                }
                if(inventory.length < 9) {
                    inventory.push({ id: blockId, count: amount });
                    updateInventoryUI();
                    return true;
                } else {
                    // try stacking again
                    for(let i=0;i<inventory.length;i++) {
                        if(inventory[i].id === blockId) {
                            inventory[i].count += amount;
                            updateInventoryUI();
                            return true;
                        }
                    }
                    showMessage("📦 Inventory full!", 1000);
                    return false;
                }
            }
            
            function canAfford(cost) {
                let temp = inventory.map(s => ({ id: s.id, count: s.count }));
                for(let item of cost) {
                    let need = item.amount;
                    for(let i=0;i<temp.length;i++) {
                        if(temp[i].id === item.id) {
                            let take = Math.min(need, temp[i].count);
                            need -= take;
                            temp[i].count -= take;
                            if(need === 0) break;
                        }
                    }
                    if(need > 0) return false;
                }
                return true;
            }
            
            function consumeCost(cost) {
                for(let item of cost) {
                    let remain = item.amount;
                    for(let i=0;i<inventory.length;i++) {
                        if(inventory[i].id === item.id && remain > 0) {
                            let deduct = Math.min(remain, inventory[i].count);
                            inventory[i].count -= deduct;
                            remain -= deduct;
                            if(inventory[i].count === 0) {
                                inventory.splice(i,1);
                                i--;
                            }
                            if(remain === 0) break;
                        }
                    }
                }
                updateInventoryUI();
            }
            
            function craftRecipe(recipe) {
                if(!canAfford(recipe.cost)) {
                    showMessage(`❌ Need ${recipe.desc}`, 1200);
                    return false;
                }
                consumeCost(recipe.cost);
                addToInventory(recipe.resultId, 1);
                showMessage(`✅ Crafted ${recipe.name}!`, 1000);
                return true;
            }
            
            function placeBlock(tileX, tileY, blockId) {
                if(tileX < 0 || tileX >= WORLD_W || tileY < 0 || tileY >= WORLD_H) return false;
                if(world[tileY][tileX] !== 0 && world[tileY][tileX] !== 1 && world[tileY][tileX] !== 2) {
                    if(world[tileY][tileX] !== 0) { showMessage("⛔ Can't replace", 600); return false; }
                }
                let slotIndex = -1;
                for(let i=0;i<inventory.length;i++) {
                    if(inventory[i].id === blockId && inventory[i].count > 0) {
                        slotIndex = i;
                        break;
                    }
                }
                if(slotIndex === -1) { showMessage("❌ No blocks!", 700); return false; }
                inventory[slotIndex].count--;
                if(inventory[slotIndex].count === 0) inventory.splice(slotIndex,1);
                world[tileY][tileX] = blockId;
                totalBlocksPlaced++;
                updateStatsUI();
                updateInventoryUI();
                showFloatingNumber(tileX, tileY, `+${BLOCKS[blockId].icon}`, "#aaffaa");
                renderWorld();
                return true;
            }
            
            function mineBlock(tileX, tileY) {
                if(tileX < 0 || tileX >= WORLD_W || tileY < 0 || tileY >= WORLD_H) return;
                let blockId = world[tileY][tileX];
                if(blockId === 0) return;
                if(BLOCKS[blockId] && BLOCKS[blockId].solid) {
                    addToInventory(blockId, 1);
                    world[tileY][tileX] = 0;  // becomes air
                    totalBlocksMined++;
                    updateStatsUI();
                    showFloatingNumber(tileX, tileY, `+${BLOCKS[blockId].icon}`, "#ffcc66");
                    showMessage(`⛏️ Mined ${BLOCKS[blockId].name}`, 600);
                    renderWorld();
                }
            }
            
            function updateInventoryUI() {
                const bar = document.getElementById('inventoryBar');
                if(!bar) return;
                bar.innerHTML = '';
                for(let i=0;i<9;i++) {
                    const slot = inventory[i] || null;
                    const div = document.createElement('div');
                    div.className = 'slot';
                    if(selectedSlot === i) div.classList.add('selected');
                    const icon = slot ? (BLOCKS[slot.id]?.icon || '📦') : '❓';
                    const count = slot ? slot.count : 0;
                    const name = slot ? (BLOCKS[slot.id]?.name || 'Block') : 'Empty';
                    div.innerHTML = `
                        <div class="slot-icon">${icon}</div>
                        <div class="block-name">${name}</div>
                        ${count > 0 ? `<div class="slot-count">${count}</div>` : ''}
                    `;
                    div.onclick = (function(idx){ return () => { selectSlot(idx); }; })(i);
                    bar.appendChild(div);
                }
            }
            
            function selectSlot(idx) {
                selectedSlot = idx;
                updateInventoryUI();
                const item = inventory[selectedSlot];
                if(item) showMessage(`Selected: ${BLOCKS[item.id]?.name}`, 700);
                else showMessage(`Empty slot`, 500);
            }
            
            function updateStatsUI() {
                document.getElementById('blockCount').innerText = totalBlocksPlaced;
                document.getElementById('minedCount').innerText = totalBlocksMined;
            }
            
            function showMessage(msg, duration=1200) {
                const box = document.getElementById('messageBox');
                if(box) {
                    box.innerText = msg;
                    box.style.opacity = '1';
                    setTimeout(() => { if(box.innerText === msg) box.style.opacity = '0.9'; }, duration);
                }
            }
            
            function showFloatingNumber(tileX, tileY, text, color) {
                const rect = canvas.getBoundingClientRect();
                const screenX = rect.left + (tileX * TILE_SIZE + TILE_SIZE/2);
                const screenY = rect.top + (tileY * TILE_SIZE + TILE_SIZE/2 - 15);
                const div = document.createElement('div');
                div.className = 'floating-number';
                div.innerText = text;
                div.style.position = 'fixed';
                div.style.left = screenX + 'px';
                div.style.top = screenY + 'px';
                div.style.color = color;
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 500);
            }
            
            // world generation (simple)
            function generateWorld() {
                for(let y=0;y<WORLD_H;y++) {
                    for(let x=0;x<WORLD_W;x++) {
                        if(y > WORLD_H-4) world[y][x] = 1;
                        else if(y > WORLD_H-6) world[y][x] = 2;
                        else world[y][x] = 3;
                        if(Math.random()<0.08 && y > WORLD_H-6 && world[y][x]===3) world[y][x]=4;
                        if(Math.random()<0.04 && y > WORLD_H-5 && world[y][x]===3) world[y][x]=6;
                        if(Math.random()<0.05 && y > WORLD_H-6 && world[y][x]===3) world[y][x]=7;
                    }
                }
                for(let i=0;i<6;i++) {
                    let x=2+Math.floor(Math.random()*(WORLD_W-4));
                    let y=WORLD_H-4;
                    if(world[y][x]===1) world[y][x]=5;
                }
            }
            
            // Drawing with 3D style
            function drawBlock(ctx, x, y, blockId) {
                const block = BLOCKS[blockId];
                if(!block || blockId === 0 || !block.solid) {
                    ctx.fillStyle = "#2e3a48";
                    ctx.fillRect(x, y, TILE_SIZE-1, TILE_SIZE-1);
                    ctx.strokeStyle = "#4a5568";
                    ctx.strokeRect(x, y, TILE_SIZE-1, TILE_SIZE-1);
                    return;
                }
                const size = TILE_SIZE;
                ctx.fillStyle = block.topColor;
                ctx.fillRect(x, y, size, size-8);
                ctx.fillStyle = block.sideColor;
                ctx.fillRect(x, y+size-10, size, 8);
                ctx.fillStyle = block.topColor;
                ctx.fillRect(x+2, y+2, size-4, 8);
                ctx.fillStyle = "#fff3";
                ctx.font = `${Math.floor(size*0.45)}px monospace`;
                ctx.fillText(block.icon, x+14, y+32);
                ctx.strokeStyle = "#00000066";
                ctx.strokeRect(x, y, size, size);
            }
            
            function renderWorld() {
                if(!ctx) return;
                ctx.clearRect(0,0,width,height);
                const grad = ctx.createLinearGradient(0,0,0,height);
                grad.addColorStop(0,"#2c5270");
                grad.addColorStop(1,"#141c2c");
                ctx.fillStyle=grad;
                ctx.fillRect(0,0,width,height);
                const offsetX = (width/2) - (WORLD_W * TILE_SIZE)/2;
                const offsetY = 70;
                for(let row=0;row<WORLD_H;row++) {
                    for(let col=0;col<WORLD_W;col++) {
                        let xPos = offsetX + col * TILE_SIZE;
                        let yPos = offsetY + row * TILE_SIZE;
                        drawBlock(ctx, xPos, yPos, world[row][col]);
                    }
                }
            }
            
            function getMouseTile(clientX, clientY) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                const canvasX = (clientX - rect.left) * scaleX;
                const canvasY = (clientY - rect.top) * scaleY;
                const offsetX = (width/2) - (WORLD_W * TILE_SIZE)/2;
                const offsetY = 70;
                for(let row=0;row<WORLD_H;row++) {
                    for(let col=0;col<WORLD_W;col++) {
                        let left = offsetX + col * TILE_SIZE;
                        let top = offsetY + row * TILE_SIZE;
                        if(canvasX >= left && canvasX <= left+TILE_SIZE && canvasY >= top && canvasY <= top+TILE_SIZE) {
                            return { x: col, y: row };
                        }
                    }
                }
                return null;
            }
            
            function handleTap(e) {
                e.preventDefault();
                const touch = e.touches ? e.touches[0] : e;
                const tile = getMouseTile(touch.clientX, touch.clientY);
                if(!tile) return;
                if(isMineMode) {
                    mineBlock(tile.x, tile.y);
                } else {
                    if(inventory[selectedSlot]) {
                        placeBlock(tile.x, tile.y, inventory[selectedSlot].id);
                    } else { showMessage("❗ No block selected", 700); }
                }
            }
            
            // Mode toggle
            function setMineMode(active) {
                isMineMode = active;
                const modeDiv = document.getElementById('modeIndicator');
                if(modeDiv) {
                    if(isMineMode) modeDiv.innerHTML = '⛏️ MINE MODE (tap to mine)';
                    else modeDiv.innerHTML = '🏗️ PLACE MODE (tap to build)';
                }
                const mineBtn = document.getElementById('mineModeBtn');
                if(mineBtn) {
                    if(isMineMode) mineBtn.style.background = "#aa5533aa";
                    else mineBtn.style.background = "#000000aa";
                }
                showMessage(isMineMode ? "⛏️ Mine mode ACTIVE" : "🏗️ Place mode ACTIVE", 800);
            }
            
            // crafting modal
            function buildMobileCraftingUI() {
                const container = document.getElementById('mobileRecipeList');
                if(!container) return;
                container.innerHTML = '';
                recipes.forEach(rec => {
                    const div = document.createElement('div');
                    div.className = 'recipe';
                    div.innerHTML = `
                        <div class="recipe-icon">${rec.resultIcon}</div>
                        <div class="recipe-info">
                            <div class="recipe-name">${rec.name}</div>
                            <div class="recipe-cost">${rec.desc}</div>
                        </div>
                    `;
                    div.onclick = () => { craftRecipe(rec); renderWorld(); };
                    container.appendChild(div);
                });
            }
            
            function initInventory() {
                inventory = [];
                addToInventory(1, 12);
                addToInventory(2, 10);
                addToInventory(3, 6);
                addToInventory(4, 4);
                selectedSlot = 0;
                updateInventoryUI();
            }
            
            function resizeAndRender() {
                width = window.innerWidth;
                height = window.innerHeight;
                canvas.width = width;
                canvas.height = height;
                renderWorld();
            }
            
            // event binding
            window.addEventListener('load', () => {
                resizeAndRender();
                generateWorld();
                initInventory();
                buildMobileCraftingUI();
                updateStatsUI();
                renderWorld();
                
                canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(e); }, {passive:false});
                canvas.addEventListener('mousedown', (e) => { e.preventDefault(); handleTap(e); });
                
                document.getElementById('mineModeBtn').addEventListener('click', () => { setMineMode(!isMineMode); });
                document.getElementById('openCraftBtn').addEventListener('click', () => {
                    document.getElementById('craftModal').classList.add('active');
                    buildMobileCraftingUI();
                });
                document.getElementById('closeModalBtn').addEventListener('click', () => {
                    document.getElementById('craftModal').classList.remove('active');
                });
                window.addEventListener('resize', () => { resizeAndRender(); });
                setMineMode(false);
                showMessage("✨ TAP to PLACE | HOLD MINE button + TAP to MINE ✨", 2500);
            });
        })();
    </script>
</body>
</html>
